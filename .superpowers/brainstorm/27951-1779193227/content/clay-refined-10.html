<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God's Assistant — 10 Refined Claymorphic Variations</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Satoshi:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0b10;color:#e4e2ec;font-family:'Plus Jakarta Sans',sans-serif;padding:28px 16px;min-height:100vh}
h1{text-align:center;font-size:13px;font-weight:600;color:rgba(255,255,255,0.2);letter-spacing:5px;text-transform:uppercase;margin-bottom:4px}
.sub{text-align:center;font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:6px}
.note{text-align:center;font-size:9px;color:rgba(255,255,255,0.12);margin-bottom:32px;max-width:640px;margin-left:auto;margin-right:auto;line-height:1.7}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;max-width:1100px;margin:0 auto}

.var{display:flex;flex-direction:column;align-items:center;gap:10px}
.var-label{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.var-num{border-radius:10px;padding:4px 10px;font-weight:600;font-size:10px}
.var-name{color:rgba(255,255,255,0.35)}
.var-desc{font-size:8px;color:rgba(255,255,255,0.18);text-align:center;max-width:420px;line-height:1.5;margin-top:-4px}

/* ============ CLAY RECIPE (on every element):
   box-shadow:
     Xpx Xpx Xpx rgba(0,0,0, lift)        — outer: depth/lift
     inset -Xpx -Xpx Xpx rgba(0,0,0, dim)  — inner dark: bottom-right
     inset Xpx Xpx Xpx rgba(255,255,255, hl) — inner light: top-left
   border-radius: 28-40px (puffy)
   background: MUTED SOPHISTICATED color (not candy)
   ============ */

.ov{width:500px;border-radius:32px;overflow:hidden}
.ov .top{display:flex;align-items:center;padding:14px 20px;gap:10px}
.ov .orb{width:30px;height:30px;border-radius:50%;flex-shrink:0}
.ov .title{font-size:11px;font-weight:700;flex:1;letter-spacing:0.8px}
.ov .badge{font-family:'Geist Mono',monospace;font-size:7px;letter-spacing:0.5px;padding:3px 8px;border-radius:8px}
.ov .stats{font-family:'Geist Mono',monospace;font-size:7px;opacity:0.4}

.ov .inp-wrap{padding:0 16px 10px}
.ov .inp{display:flex;align-items:center;gap:6px;border-radius:20px;padding:4px 4px 4px 16px}
.ov .inp input{flex:1;background:transparent;border:none;outline:none;font-family:'Geist Mono',monospace;font-size:10px;padding:7px 0}
.ov .send{border:none;border-radius:14px;padding:7px 14px;font-size:9px;font-weight:700;cursor:pointer;letter-spacing:0.3px}
.ov .mic{border:none;border-radius:12px;padding:7px 10px;cursor:pointer;font-size:12px}

.ov .resp-wrap{padding:0 16px 10px}
.ov .resp{border-radius:22px;padding:14px 18px}
.ov .resp .q{font-size:10px;opacity:0.5;margin-bottom:6px;font-style:italic;font-family:'Geist Mono',monospace}
.ov .resp .a{font-size:11px;line-height:1.7;opacity:0.85}

.ov .term-wrap{padding:0 16px 10px}
.ov .th{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 6px}
.ov .tl{font-family:'Geist Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.3}
.ov .dots{display:flex;gap:4px}.ov .dots span{width:6px;height:6px;border-radius:50%}
.ov .term{border-radius:18px;padding:12px 14px;font-family:'Geist Mono',monospace;font-size:9px;line-height:1.8;max-height:90px;overflow:auto}
.ov .cmd::before{content:'❯ ';opacity:0.35}
.ov .out{opacity:0.45;padding-left:14px}

.ov .ag-wrap{padding:0 16px 10px}
.ov .ag-label{font-family:'Geist Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.3;margin-bottom:6px;padding-left:6px}
.ov .agents{display:flex;gap:6px}
.ov .ag{flex:1;border-radius:14px;padding:8px 10px;font-family:'Geist Mono',monospace;font-size:8px;display:flex;align-items:center;gap:6px}
.ov .ag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ov .ag-n{flex:1;opacity:0.7}
.ov .ag-t{opacity:0.35;font-size:7px}

.ov .bot{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;font-family:'Geist Mono',monospace;font-size:7px;opacity:0.2}

/* ============================================
   V1: Obsidian Slate
   Deep charcoal clay. Sophisticated, executive.
   Muted blue-grey tones. Platinum accents.
   ============================================ */
.c1{
  background: linear-gradient(145deg, #2a2a35, #222230);
  box-shadow: 12px 12px 28px rgba(0,0,0,0.55), inset -6px -6px 14px rgba(0,0,0,0.3), inset 6px 6px 14px rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.04);
}
.c1 .orb{background:linear-gradient(135deg,#9ca3af,#6b7280);box-shadow:4px 4px 10px rgba(0,0,0,0.4),inset -3px -3px 6px rgba(0,0,0,0.25),inset 3px 3px 6px rgba(255,255,255,0.2)}
.c1 .title{color:#d1d5db}
.c1 .badge{background:rgba(156,163,175,0.12);color:#9ca3af}
.c1 .inp{background:linear-gradient(145deg,#1e1e28,#1a1a24);box-shadow:inset 3px 3px 8px rgba(0,0,0,0.35),inset -2px -2px 5px rgba(255,255,255,0.02)}
.c1 .inp input{color:#d1d5db}.c1 .inp input::placeholder{color:rgba(255,255,255,0.12)}
.c1 .send{background:linear-gradient(135deg,#9ca3af,#6b7280);color:#1a1a24;box-shadow:3px 3px 8px rgba(0,0,0,0.35),inset -2px -2px 4px rgba(0,0,0,0.2),inset 2px 2px 4px rgba(255,255,255,0.15)}
.c1 .mic{background:linear-gradient(145deg,#252530,#20202a);color:rgba(255,255,255,0.25);box-shadow:2px 2px 5px rgba(0,0,0,0.3),inset -2px -2px 3px rgba(0,0,0,0.2),inset 2px 2px 3px rgba(255,255,255,0.03)}
.c1 .resp{background:linear-gradient(145deg,#2e2e3a,#262632);color:#d1d5db;box-shadow:6px 6px 16px rgba(0,0,0,0.3),inset -4px -4px 10px rgba(0,0,0,0.2),inset 4px 4px 10px rgba(255,255,255,0.03)}
.c1 .term{background:linear-gradient(145deg,#16161e,#121218);box-shadow:inset 4px 4px 10px rgba(0,0,0,0.45),inset -2px -2px 5px rgba(255,255,255,0.01)}.c1 .cmd{color:#9ca3af}
.c1 .ag{background:linear-gradient(145deg,#2a2a35,#242430);box-shadow:3px 3px 7px rgba(0,0,0,0.3),inset -2px -2px 5px rgba(0,0,0,0.2),inset 2px 2px 5px rgba(255,255,255,0.02);color:#9ca3af}
.c1 .ag-dot.ok{background:#6ee7b7}.c1 .ag-dot.run{background:#93c5fd}
.c1 .dots span:nth-child(1){background:#6b7280}.c1 .dots span:nth-child(2){background:#6b7280}.c1 .dots span:nth-child(3){background:#6b7280}
.c1n{background:rgba(42,42,53,0.4);color:#9ca3af}

<body>

<h1>God's Assistant</h1>
<p class="sub">10 Refined Claymorphic Themes — Sophisticated, not kiddie</p>
<p class="note">Every element uses the 3-shadow clay recipe: outer lift + inset dark (depth) + inset light (highlight). Muted, sophisticated color palettes. Terminal is always sunken (inset-only). Agents panel replaces system processes.</p>

<div class="grid">

<!-- Helper: each variation gets the same content structure -->
<script>
function makeContent(cls, num, name, desc) {
  return `
  <div class="var" data-choice="${num}" onclick="toggleSelect(this)">
    <div class="var-label"><span class="var-num ${cls}n">${num}</span><span class="var-name">${name}</span></div>
    <div class="var-desc">${desc}</div>
    <div class="ov ${cls}">
      <div class="top">
        <div class="orb"></div>
        <div class="title">GOD'S ASSISTANT</div>
        <div class="badge">READY</div>
        <div class="stats">CPU 18% · BAT 87%</div>
      </div>
      <div class="inp-wrap"><div class="inp">
        <input value="check iPhone mirroring skill" />
        <div class="mic">🎤</div>
        <div class="send">Send</div>
      </div></div>
      <div class="resp-wrap"><div class="resp">
        <div class="q">"check iPhone mirroring skill"</div>
        <div class="a">iPhone mirroring skill is loaded. The mirroir-mcp server is reachable and the iPhone Mirroring window is currently active. Skill located at ~/.claude/skills/iphone-mirroring/SKILL.md</div>
      </div></div>
      <div class="term-wrap">
        <div class="th"><span class="tl">Terminal</span><div class="dots"><span></span><span></span><span></span></div></div>
        <div class="term">
          <div class="cmd">claude -p "check iPhone mirroring skill"</div>
          <div class="out">→ Skill loaded at ~/.claude/skills/iphone-mirroring/</div>
          <div class="out">→ mirroir-mcp server: reachable</div>
          <div class="out">→ iPhone Mirroring window: active</div>
        </div>
      </div>
      <div class="ag-wrap">
        <div class="ag-label">Agents</div>
        <div class="agents">
          <div class="ag"><div class="ag-dot ok"></div><span class="ag-n">Claude Code</span><span class="ag-t">✓ 3.2s</span></div>
          <div class="ag"><div class="ag-dot run"></div><span class="ag-n">Fix auth bug</span><span class="ag-t">running</span></div>
        </div>
      </div>
      <div class="bot"><span>⌘⇧G · SPACE · ESC</span><span>PUSH-TO-TALK</span></div>
    </div>
  </div>`;
}
document.querySelector('.grid').innerHTML =
  makeContent('c1','1','Obsidian Slate','Deep charcoal. Executive boardroom. Platinum grey accents.') +
  makeContent('c2','2','Matte Burgundy','Wine leather. Warm luxury. Gold accents on deep red.') +
  makeContent('c3','3','Deep Navy','Military precision. Steel blue on midnight. Authoritative.') +
  makeContent('c4','4','Smoked Violet','Plum twilight. Moody, refined. Lavender silver highlights.') +
  makeContent('c5','5','Carbon Teal','Engineering grade. Teal circuitry on carbon black.') +
  makeContent('c6','6','Graphite Bronze','Luxury watch face. Copper on near-black. Premium hardware.') +
  makeContent('c7','7','Midnight Emerald','Forest at night. Jade green, gold firefly accents.') +
  makeContent('c8','8','Storm Grey','Thundercloud. Electric white on dark iron. Raw power.') +
  makeContent('c9','9','Volcanic Red','Deep magma. Ember glow. Dangerous, powerful.') +
  makeContent('c10','10','Cosmic Black','Near-black + electric violet. Maximum contrast. Godmode.');
</script>

</div>
</body>
</html>
